name: ai-exam-evaluator
version: 0.1.0
description: >
  AI Exam Evaluator environment that grades student answers against rubrics
  with partial progress rewards (easy → medium → hard tasks).

authors:
  - name: Abhay Gade
    email: abhaygade27@gmail.com

license: MIT

entrypoint: server/app.py

dependencies:
  - fastapi
  - uvicorn
  - requests
  - python-dotenv
  - openenv-core

environment:
  observation_space:
    type: string
    description: "Student answer text input"
  action_space:
    type: string
    description: "Agent-generated rubric score or feedback"
  reward_space:
    type: float
    range: [0.0, 1.0]
    description: "Reward based on similarity between agent score and rubric score"

tasks:
  - id: easy
    description: "Simple factual question grading"
    dataset: dataset.json
    grader: Grader.py

  - id: medium
    description: "Moderate reasoning question grading"
    dataset: dataset.json
    grader: Grader.py

  - id: hard
    description: "Complex analytical question grading"
    dataset: dataset.json
    grader: Grader.py

baseline_inference: inference.py

